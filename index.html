<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MGT 960 Files</title>
</head>
<body>
  <h1>MGT 960 Files</h1>
  <ul id="file-list">
    <li>Loading files...</li>
  </ul>

  <script>
    const owner = "nimahaghpanah";
    const repo = "mgt960";
    const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/`;

    fetch(apiUrl)
      .then(response => {
        if (!response.ok) {
          throw new Error("GitHub API error: " + response.status);
        }
        return response.json();
      })
      .then(files => {
        const list = document.getElementById("file-list");
        list.innerHTML = "";

        files
          .filter(file => file.type === "file" && file.name !== "index.html")
          .sort((a, b) => a.name.localeCompare(b.name))
          .forEach(file => {
            const li = document.createElement("li");
            const a = document.createElement("a");
            a.href = file.name;
            a.textContent = file.name;
            li.appendChild(a);
            list.appendChild(li);
          });

        if (!list.children.length) {
          list.innerHTML = "<li>No files found.</li>";
        }
      })
      .catch(error => {
        document.getElementById("file-list").innerHTML =
          `<li>Error loading files: ${error.message}</li>`;
      });
  </script>
</body>
</html>
